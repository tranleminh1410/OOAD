<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng nhập - Quản Lý Lịch Trình</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#004f96" },
                    fontFamily: { sans: ["Inter", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f2f3fb; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- KHUNG ĐĂNG NHẬP / ĐĂNG KÝ -->
    <div class="glass-panel w-full max-w-md rounded-2xl p-8 border border-white relative overflow-hidden">
        
        <!-- HEADER -->
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3">
                <span class="material-symbols-outlined text-[28px]">calendar_month</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800" id="formTitle">Đăng Nhập</h1>
            <p class="text-sm text-slate-500 mt-1" id="formSubtitle">Vui lòng đăng nhập để quản lý lịch trình</p>
        </div>

        <!-- FORM CHÍNH -->
        <div class="flex flex-col gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Tên đăng nhập</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-2.5 text-slate-400">person</span>
                    <input id="txtUsername" type="text" class="w-full h-11 pl-10 pr-3 rounded-lg border border-slate-300 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Nhập tài khoản..." />
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Mật khẩu</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-2.5 text-slate-400">lock</span>
                    <input id="txtPassword" type="password" class="w-full h-11 pl-10 pr-3 rounded-lg border border-slate-300 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Nhập mật khẩu..." />
                </div>
            </div>

            <!-- THÔNG BÁO LỖI -->
            <p id="errorMsg" class="text-sm text-red-500 font-medium hidden text-center mt-1"></p>
            <p id="successMsg" class="text-sm text-emerald-600 font-medium hidden text-center mt-1"></p>

            <!-- NÚT XỬ LÝ -->
            <button id="btnAction" onclick="handleAction()" class="w-full h-11 mt-2 bg-primary text-white font-semibold rounded-lg hover:bg-blue-700 active:scale-95 transition-all shadow-md flex items-center justify-center gap-2">
                <span>Đăng Nhập Ngay</span>
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
            </button>
        </div>

        <!-- CHUYỂN ĐỔI CHẾ ĐỘ -->
        <div class="mt-6 text-center text-sm text-slate-500">
            <span id="toggleText">Chưa có tài khoản?</span>
            <button onclick="toggleMode()" class="text-primary font-semibold hover:underline ml-1" id="btnToggle">Tạo tài khoản mới</button>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        const title = document.getElementById('formTitle');
        const subtitle = document.getElementById('formSubtitle');
        const btnAction = document.getElementById('btnAction');
        const toggleText = document.getElementById('toggleText');
        const btnToggle = document.getElementById('btnToggle');
        
        const txtUsername = document.getElementById('txtUsername');
        const txtPassword = document.getElementById('txtPassword');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        function toggleMode() {
            isLoginMode = !isLoginMode;
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            txtPassword.value = '';

            if (isLoginMode) {
                title.innerText = 'Đăng Nhập';
                subtitle.innerText = 'Vui lòng đăng nhập để quản lý lịch trình';
                btnAction.innerHTML = '<span>Đăng Nhập Ngay</span><span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
                toggleText.innerText = 'Chưa có tài khoản?';
                btnToggle.innerText = 'Tạo tài khoản mới';
            } else {
                title.innerText = 'Đăng Ký Tài Khoản';
                subtitle.innerText = 'Tạo tài khoản để bắt đầu sử dụng hệ thống';
                btnAction.innerHTML = '<span>Đăng Ký</span><span class="material-symbols-outlined text-[20px]">person_add</span>';
                toggleText.innerText = 'Đã có tài khoản?';
                btnToggle.innerText = 'Đăng nhập ngay';
            }
        }

        async function handleAction() {
            const username = txtUsername.value.trim();
            const password = txtPassword.value.trim();

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (!username || !password) {
                errorMsg.innerText = "Vui lòng nhập đầy đủ tài khoản và mật khẩu!";
                errorMsg.classList.remove('hidden');
                return;
            }

            const endpoint = isLoginMode ? '/api/Auth/login' : '/api/Auth/register';
            const payload = { UserName: username, Password: password };

            try {
                btnAction.disabled = true;
                btnAction.classList.add('opacity-70');

                const response = await fetch(`http://localhost:5207${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || "Có lỗi xảy ra từ máy chủ!");
                }

                if (isLoginMode) {
                    localStorage.setItem('jwt_token', data.token);
                    localStorage.setItem('username', data.userName);
                    
                    successMsg.innerText = "Đăng nhập thành công! Đang chuyển hướng...";
                    successMsg.classList.remove('hidden');
                    
                    setTimeout(() => { window.location.href = 'index_final.html'; }, 1000);
                } else {
                    successMsg.innerText = "Đăng ký thành công! Vui lòng đăng nhập.";
                    successMsg.classList.remove('hidden');
                    setTimeout(() => { toggleMode(); }, 1500);
                }

            } catch (error) {
                errorMsg.innerText = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btnAction.disabled = false;
                btnAction.classList.remove('opacity-70');
            }
        }
    </script>
</body>
</html>
